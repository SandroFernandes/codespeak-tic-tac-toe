<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#1565C0"/>

  <!-- Grid lines -->
  <!-- Vertical lines -->
  <line x1="170" y1="80" x2="170" y2="432" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="342" y1="80" x2="342" y2="432" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <!-- Horizontal lines -->
  <line x1="80" y1="170" x2="432" y2="170" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="80" y1="342" x2="432" y2="342" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- X in top-left cell -->
  <line x1="104" y1="104" x2="148" y2="148" stroke="#FF6B6B" stroke-width="16" stroke-linecap="round"/>
  <line x1="148" y1="104" x2="104" y2="148" stroke="#FF6B6B" stroke-width="16" stroke-linecap="round"/>

  <!-- O in center cell -->
  <circle cx="256" cy="256" r="34" fill="none" stroke="#90CAF9" stroke-width="16"/>

  <!-- X in bottom-right cell -->
  <line x1="364" y1="364" x2="408" y2="408" stroke="#FF6B6B" stroke-width="16" stroke-linecap="round"/>
  <line x1="408" y1="364" x2="364" y2="408" stroke="#FF6B6B" stroke-width="16" stroke-linecap="round"/>
</svg>
